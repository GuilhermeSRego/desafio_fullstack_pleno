services:
  - type: web
    name: painel-prefeitura-backend
    env: docker
    region: ohio
    plan: free
    dockerCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: painel-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: painel-db
    region: ohio
    plan: free
